base_url: "https://ayore.org"
languages: ["en", "ayo"]
scrape_es: false  # Set true to also scrape Spanish pages (slower, not needed for EN↔AYO pipeline)
delay_seconds: 1.5
max_retries: 3
timeout_seconds: 30

# Sections with their paths in all three languages.
# EN and AYO share the same path slugs, but EN has no language prefix in the URL
# (e.g. https://ayore.org/culture/beliefs/ vs https://ayore.org/ayo/culture/beliefs/)
sections:
  - path_es: "cultura/creencias"
    path_en: "culture/beliefs"
    path_ayo: "culture/beliefs"
    type: "belief"
    estimated_pages: 11
  - path_es: "cultura/relatos-personales"
    path_en: "culture/first-person-narratives"
    path_ayo: "culture/first-person-narratives"
    type: "personal_narrative"
    estimated_pages: 14
  - path_es: "cultura/comidas"
    path_en: "culture/foods"
    path_ayo: "culture/foods"
    type: "food"
    estimated_pages: 1
  - path_es: "cultura/juegos"
    path_en: "culture/games"
    path_ayo: "culture/games"
    type: "game"
    estimated_pages: 6
  - path_es: "cultura/medicina"
    path_en: "culture/medicine"
    path_ayo: "culture/medicine"
    type: "medicine"
    estimated_pages: 1
  - path_es: "cultura/canciones-nativas"
    path_en: "culture/native-songs"
    path_ayo: "culture/native-songs"
    type: "song"
    estimated_pages: 22
  - path_es: "cultura/historia-oral"
    path_en: "culture/oral-history"
    path_ayo: "culture/oral-history"
    type: "oral_history"
    estimated_pages: 12
  - path_es: "cultura/tradiciones-orales"
    path_en: "culture/oral-traditions"
    path_ayo: "culture/oral-traditions"
    type: "oral_tradition"
    estimated_pages: 15
  - path_es: "cultura/ensenanzas"
    path_en: "culture/teachings"
    path_ayo: "culture/teachings"
    type: "teaching"
    estimated_pages: 50

pdf_resources:
  - url: "https://ayore.org/wp-content/uploads/2018/10/ayore-dictionary.pdf"
    type: "dictionary"
    filename: "ayore-dictionary.pdf"
  - url_page: "https://ayore.org/es/idioma/gramatica/"
    type: "grammar"
    # PDF URL to be discovered from the grammar page
